<div>
  <h2>Recurso de Administrador</h2>

  <p *ngIf="loading">Cargando recurso crítico...</p>

  <div *ngIf="error" class="alert">
    {{ error }}
  </div>

  <div *ngIf="!loading && !error">
    <p><strong>{{ message }}</strong></p>

    <ul class="list" *ngIf="userInfo">
      <li class="card">
        <span><strong>ID:</strong> {{ userInfo.id }}</span>
        <span><strong>Email:</strong> {{ userInfo.email }}</span>
        <span><strong>Rol:</strong> {{ userInfo.role }}</span>
      </li>
    </ul>
  </div>

  <button class="btn" (click)="volverHome()">Volver a Home</button>
</div>
